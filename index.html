<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valencia Race | Inscripciones 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Futura', 'Avant Garde', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #f5f7fa;
            color: #1a2a3a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .main-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-badge {
            display: inline-block;
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            color: white;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #6a7a8a;
            font-size: 0.9rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .hero-image {
            text-align: center;
            margin: 1.5rem 0 2rem 0;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s ease;
        }

        .hero-image img:hover {
            transform: scale(1.01);
        }

        .dashboard {
            display: flex;
            gap: 2rem;
            min-height: 500px;
        }

        .main-content {
            flex: 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.05);
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a3a4a;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
            font-size: 1.5rem;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar.open {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            color: white;
        }

        .sidebar-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .menu-items {
            flex: 1;
            padding: 1rem 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: #f0f2f5;
        }

        .menu-item.active {
            background: #eef2f5;
            border-left-color: #2a5a6a;
        }

        .menu-icon {
            font-size: 1.5rem;
        }

        .menu-text {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1a2a3a;
        }

        .close-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            opacity: 0.7;
        }

        .close-menu:hover {
            opacity: 1;
        }

        /* ========== ESTILOS DEL FORMULARIO ========== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #8a9aaa;
        }

        input,
        select {
            width: 100%;
            background: #f8f9fb;
            border: 1px solid #e0e4e8;
            border-radius: 12px;
            padding: 12px 14px;
            color: #1a2a3a;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #2a5a6a;
            background: white;
            box-shadow: 0 0 0 3px rgba(26, 58, 74, 0.1);
        }

        input[type="tel"] {
            font-family: 'Poppins', sans-serif;
        }

        /* ========== SECCIÓN FOTO CONDICIONAL ========== */
        .photo-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .photo-section.visible {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photo-area {
            border: 2px dashed #d0d6dc;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            background: #fafcfd;
            transition: all 0.3s ease;
        }

        .photo-area:hover {
            border-color: #2a5a6a;
            background: #f0f4f6;
        }

        .photo-area.drag-over {
            border-color: #2a5a6a;
            background: #e0ecf0;
        }

        .photo-area .camera-icon {
            font-size: 2rem;
            margin-bottom: 0.3rem;
        }

        .photo-area p {
            font-size: 0.75rem;
            color: #6a7a8a;
        }

        .photo-area small {
            font-size: 0.6rem;
            color: #9aaab8;
        }

        .photo-preview {
            margin-top: 1rem;
            text-align: center;
            display: none;
        }

        .photo-preview.active {
            display: block;
        }

        .preview-image img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #2a5a6a;
        }

        .remove-photo-btn {
            background: none;
            border: 1px solid #c0392b;
            color: #c0392b;
            padding: 3px 10px;
            font-size: 0.6rem;
            border-radius: 20px;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .remove-photo-btn:hover {
            background: #c0392b;
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 40px;
            width: 100%;
            font-family: inherit;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 58, 74, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2a5a6a;
            color: #2a5a6a;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.7rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-outline:hover {
            background: #2a5a6a;
            color: white;
        }

        .btn-danger {
            border-color: #c0392b;
            color: #c0392b;
        }

        .btn-danger:hover {
            background: #c0392b;
            color: white;
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid #e8ecef;
        }

        .info-icon {
            font-size: 1.5rem;
            width: 45px;
        }

        .info-text strong {
            display: block;
            font-size: 0.7rem;
            color: #9aaab8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-text span {
            font-size: 1rem;
            font-weight: 600;
            color: #1a2a3a;
        }

        .admin-stats {
            background: #eef2f5;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .admin-stats p {
            color: #1a3a4a;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            width: 90%;
            max-width: 340px;
            text-align: center;
        }

        .modal-box input {
            margin: 1rem 0;
        }

        .error-msg {
            color: #c0392b;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            display: none;
        }

        .oculto {
            display: none;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .menu-toggle {
                display: flex;
            }
            h1 {
                font-size: 2.2rem;
            }
            .container {
                padding: 1rem;
            }
            .dashboard {
                flex-direction: column;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <button class="close-menu" id="closeMenu">✕</button>
        <div class="sidebar-header">
            <h3>🏃 Valencia Race</h3>
            <p>Menú de navegación</p>
        </div>
        <div class="menu-items">
            <div class="menu-item active" data-section="registro">
                <div class="menu-icon">📝</div>
                <div class="menu-text">Registro de corredor</div>
            </div>
            <div class="menu-item" data-section="info">
                <div class="menu-icon">ℹ️</div>
                <div class="menu-text">Información de la carrera</div>
            </div>
            <div class="menu-item" data-section="organizador">
                <div class="menu-icon">🔐</div>
                <div class="menu-text">Acceso organizadores</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="main-header">
            <div class="logo-badge">🏆 INSCRIPCIONES 2025</div>
            <h1>VALENCIA RACE</h1>
            <div class="subtitle">3K · 5K · 9K · La carrera más vibrante del año</div>
        </div>

        <div class="hero-image">
            <img src="https://i.ibb.co/WWXn7fJy/251209214634265-performer-img-CAT1.jpg" alt="Póster oficial Guat Maltecos" loading="lazy">
        </div>

        <div class="dashboard">
            <div class="main-content" id="mainContent">
                <!-- El contenido se carga dinámicamente con JS -->
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal" style="display: none;">
        <div class="modal-box">
            <h2>🔐 Acceso organizadores</h2>
            <input type="password" id="passwordOrganizador" placeholder="Contraseña">
            <div class="btn-group" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button id="btnLogin">INGRESAR</button>
                <button id="btnCancelarLogin" class="btn-outline">CANCELAR</button>
            </div>
            <div id="errorLogin" class="error-msg">❌ Contraseña incorrecta</div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycby3pTNXnCPhmanaphttU7eXr6w3ggA9YqTwwY_x31WZ-_s7nCr-RABVCI-mlKE8quM/exec';
        const GOOGLE_SHEET_ID = '1ZDN_H9VmvKFq9i3VIjzV0pjSa97_EHw4JjVgrJ_fDwk';
        const CONTRASENA_ORGANIZADOR = "carrera2024";

        let imagenBase64 = '';
        let imagenNombre = '';

        // ============================================
        // MENÚ LATERAL
        // ============================================
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        const closeMenu = document.getElementById('closeMenu');
        const menuItems = document.querySelectorAll('.menu-item');
        const mainContent = document.getElementById('mainContent');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebarFunc() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', openSidebar);
        closeMenu.addEventListener('click', closeSidebarFunc);
        overlay.addEventListener('click', closeSidebarFunc);

        // ============================================
        // RENDERIZAR REGISTRO
        // ============================================
        function renderRegistro() {
            mainContent.innerHTML = `
                <h2 style="margin-bottom:1.5rem;">📝 Registro de corredor</h2>
                <form id="formInscripcion">
                    <!-- NOMBRE -->
                    <div class="form-group">
                        <label>NOMBRE COMPLETO</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
                    </div>

                    <!-- EDAD -->
                    <div class="form-group">
                        <label>EDAD</label>
                        <input type="number" id="edad" name="edad" placeholder="Ej: 25" min="1" max="120" required>
                    </div>

                    <!-- GÉNERO -->
                    <div class="form-group">
                        <label>GÉNERO</label>
                        <select id="genero" name="genero" required>
                            <option value="">Selecciona</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                        </select>
                    </div>

                    <!-- TELÉFONO -->
                    <div class="form-group">
                        <label>NÚMERO DE TELÉFONO</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="Ej: 12345678" maxlength="8" pattern="[0-9]{8}" required>
                        <small style="color: #9aaab8; font-size: 0.65rem;">📌 Debe tener exactamente 8 dígitos</small>
                    </div>

                    <!-- FORMA DE PAGO -->
                    <div class="form-group">
                        <label>FORMA DE PAGO</label>
                        <select id="formaPago" name="formaPago" required>
                            <option value="">Selecciona</option>
                            <option value="Efectivo">💵 Efectivo</option>
                            <option value="Depósito">🏦 Depósito</option>
                            <option value="Transferencia">💳 Transferencia</option>
                        </select>
                    </div>

                    <!-- SECCIÓN FOTO (condicional) -->
                    <div class="form-group photo-section" id="photoSection">
                        <label>📸 COMPROBANTE DE PAGO <span style="color:#c0392b;">*</span></label>
                        <div class="photo-area" id="uploadArea">
                            <div class="camera-icon">📷</div>
                            <p>Haz clic o arrastra tu comprobante</p>
                            <small>JPG, PNG · máx 5MB</small>
                        </div>
                        <input type="file" id="foto" accept="image/*" style="display:none">
                        <div class="photo-preview" id="previewArea">
                            <div class="preview-image">
                                <img id="previewImg" src="" alt="Vista previa">
                                <br>
                                <button type="button" class="remove-photo-btn" id="removePhotoBtn" style="display:none;">🗑️ Eliminar</button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">✅ INSCRIBIRME</button>
                </form>
            `;

            initFormEvents();
            initPagoLogic();
        }

        // ============================================
        // LÓGICA DE PAGO (mostrar/ocultar foto)
        // ============================================
        function initPagoLogic() {
            const formaPago = document.getElementById('formaPago');
            const photoSection = document.getElementById('photoSection');
            const fotoInput = document.getElementById('foto');

            if (!formaPago) return;

            formaPago.addEventListener('change', function() {
                const valor = this.value;
                if (valor === 'Depósito' || valor === 'Transferencia') {
                    photoSection.classList.add('visible');
                    fotoInput.setAttribute('required', 'required');
                } else {
                    photoSection.classList.remove('visible');
                    fotoInput.removeAttribute('required');
                    // Limpiar foto si está visible
                    const previewDiv = document.getElementById('previewArea');
                    const previewImg = document.getElementById('previewImg');
                    const removeBtn = document.getElementById('removePhotoBtn');
                    if (previewDiv) {
                        imagenBase64 = '';
                        imagenNombre = '';
                        fotoInput.value = '';
                        previewImg.src = '';
                        previewDiv.classList.remove('active');
                        if (removeBtn) removeBtn.style.display = 'none';
                    }
                }
            });
        }

        // ============================================
        // EVENTOS DEL FORMULARIO
        // ============================================
        function initFormEvents() {
            const uploadArea = document.getElementById('uploadArea');
            const fotoInput = document.getElementById('foto');
            const previewDiv = document.getElementById('previewArea');
            const previewImg = document.getElementById('previewImg');
            const removeBtn = document.getElementById('removePhotoBtn');

            if (uploadArea) {
                uploadArea.addEventListener('click', () => fotoInput.click());

                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.classList.add('drag-over');
                });

                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.classList.remove('drag-over');
                });

                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('drag-over');
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        procesarImagen(file);
                    } else {
                        alert('❌ Sube un archivo de imagen válido');
                    }
                });
            }

            if (fotoInput) {
                fotoInput.addEventListener('change', (e) => {
                    if (e.target.files[0]) procesarImagen(e.target.files[0]);
                });
            }

            if (removeBtn) {
                removeBtn.addEventListener('click', () => {
                    imagenBase64 = '';
                    imagenNombre = '';
                    fotoInput.value = '';
                    previewImg.src = '';
                    previewDiv.classList.remove('active');
                    removeBtn.style.display = 'none';
                });
            }

            // Función para procesar la imagen
            function procesarImagen(file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('❌ La imagen no puede superar los 5MB');
                    fotoInput.value = '';
                    return;
                }
                if (!file.type.startsWith('image/')) {
                    alert('❌ Formato no válido. Usa JPG o PNG');
                    return;
                }
                imagenNombre = file.name;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imagenBase64 = ev.target.result.split(',')[1];
                    previewImg.src = ev.target.result;
                    previewDiv.classList.add('active');
                    removeBtn.style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            }

            // Envío del formulario
            const form = document.getElementById('formInscripcion');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const nombre = document.getElementById('nombre').value;
                    const edad = document.getElementById('edad').value;
                    const genero = document.getElementById('genero').value;
                    const telefono = document.getElementById('telefono').value;
                    const formaPago = document.getElementById('formaPago').value;

                    // Validaciones
                    if (!nombre || nombre.length < 3) return alert('❌ Nombre mínimo 3 letras');
                    if (!edad || edad < 1 || edad > 120) return alert('❌ Edad entre 1 y 120');
                    if (!genero) return alert('❌ Selecciona un género');
                    if (!/^[0-9]{8}$/.test(telefono)) return alert('❌ El teléfono debe tener exactamente 8 dígitos');
                    if (!formaPago) return alert('❌ Selecciona una forma de pago');

                    // Validar foto si es Depósito o Transferencia
                    if ((formaPago === 'Depósito' || formaPago === 'Transferencia') && !imagenBase64) {
                        alert('❌ Debes subir el comprobante de pago');
                        return;
                    }

                    // Determinar estado de pago
                    let estadoPago = (formaPago === 'Efectivo') ? 'PENDIENTE' : 'CANCELADO';

                    // Enviar a Google Sheets
                    const fd = new FormData();
                    fd.append('nombre', nombre);
                    fd.append('edad', edad);
                    fd.append('genero', genero);
                    fd.append('telefono', telefono);
                    fd.append('formaPago', formaPago);
                    fd.append('estadoPago', estadoPago);
                    fd.append('image', imagenNombre);
                    fd.append('himage', imagenBase64);

                    try {
                        const btn = document.querySelector('#formInscripcion button[type="submit"]');
                        const originalText = btn.textContent;
                        btn.textContent = '⏳ ENVIANDO...';
                        btn.disabled = true;

                        const resp = await fetch(GOOGLE_SHEETS_URL, { method: 'POST', body: fd });
                        const json = await resp.json();

                        btn.textContent = originalText;
                        btn.disabled = false;

                        if (json.result === 'success') {
                            alert(`✅ ¡${nombre} inscrito correctamente!\n\nEstado de pago: ${estadoPago}`);
                            form.reset();
                            // Limpiar foto
                            if (removeBtn) removeBtn.click();
                            // Ocultar sección foto
                            document.getElementById('photoSection').classList.remove('visible');
                            // Resetear select de pago
                            document.getElementById('formaPago').value = '';
                        } else {
                            alert('❌ Error al guardar: ' + (json.error || 'Desconocido'));
                        }
                    } catch (err) {
                        alert('❌ Error de conexión. Verifica tu internet.');
                        console.error(err);
                    }
                });
            }
        }

        // ============================================
        // SECCIONES: INFO Y ORGANIZADOR
        // ============================================
        function renderInfo() {
            mainContent.innerHTML = `
                <h2 style="margin-bottom:1.5rem;">ℹ️ Información de la carrera</h2>
                <ul class="info-list">
                    <li>
                        <div class="info-icon">📅</div>
                        <div class="info-text"><strong>FECHA</strong><span>15 de Junio, 2025</span></div>
                    </li>
                    <li>
                        <div class="info-icon">📍</div>
                        <div class="info-text"><strong>LUGAR</strong><span>Ciudad de las Artes, Valencia</span></div>
                    </li>
                    <li>
                        <div class="info-icon">⏰</div>
                        <div class="info-text"><strong>SALIDA</strong><span>09:30h</span></div>
                    </li>
                    <li>
                        <div class="info-icon">🏆</div>
                        <div class="info-text"><strong>DISTANCIAS</strong><span>3K · 5K · 9K</span></div>
                    </li>
                </ul>
                <div style="margin-top:1.5rem; padding:1rem; background:#eef2f5; border-radius:16px;">
                    <p style="font-weight:500;">🎽 Incluye: Dorsal oficial, chip, camiseta técnica y avituallamiento</p>
                    <p style="font-size:0.8rem; margin-top:0.5rem; color:#1a3a4a;">💰 Formas de pago: Efectivo · Depósito · Transferencia</p>
                </div>
            `;
        }

        function renderOrganizador() {
            mainContent.innerHTML = `
                <h2 style="margin-bottom:1.5rem;">🔐 Acceso organizadores</h2>
                <div id="contenidoOrganizador">
                    <div class="admin-stats" id="estadoOrganizador">
                        <p>🔒 Acceso restringido</p>
                        <p style="font-size:0.65rem;">Ingresa la contraseña para acceder al panel</p>
                    </div>
                    <div class="btn-group">
                        <button id="btnMostrarLoginOrganizador" class="btn-outline" style="flex:1;">🔐 INICIAR SESIÓN</button>
                    </div>
                    <div id="panelOrganizadorOpciones" style="display:none; margin-top:1rem;">
                        <div class="admin-stats">
                            <p>✅ ACCESO CONCEDIDO</p>
                            <p style="font-size:0.7rem;">Los datos incluyen estado de pago</p>
                        </div>
                        <div class="btn-group">
                            <button id="btnExcel" class="btn-outline" style="flex:1;">📊 VER SHEET</button>
                            <button id="btnVaciarTodo" class="btn-outline btn-danger" style="flex:1;">⚠️ VACIAR</button>
                        </div>
                        <button id="btnCerrarSesion" class="btn-outline" style="width:100%; margin-top:0.8rem;">🚪 CERRAR SESIÓN</button>
                    </div>
                </div>
            `;
            initOrganizadorEvents();
        }

        // ============================================
        // ORGANIZADOR - EVENTOS
        // ============================================
        function initOrganizadorEvents() {
            const loginModal = document.getElementById('loginModal');

            document.getElementById('btnMostrarLoginOrganizador').onclick = () => {
                loginModal.style.display = 'flex';
                document.getElementById('errorLogin').style.display = 'none';
            };

            document.getElementById('btnLogin').onclick = () => {
                const pwd = document.getElementById('passwordOrganizador').value;
                if (pwd === CONTRASENA_ORGANIZADOR) {
                    loginModal.style.display = 'none';
                    document.getElementById('panelOrganizadorOpciones').style.display = 'block';
                    document.getElementById('estadoOrganizador').innerHTML = '<p>✅ ACCESO CONCEDIDO</p><p style="font-size:0.65rem;">Panel de control activo</p>';
                    document.getElementById('btnMostrarLoginOrganizador').style.display = 'none';
                    document.getElementById('errorLogin').style.display = 'none';
                } else {
                    document.getElementById('errorLogin').style.display = 'block';
                }
            };

            document.getElementById('btnCancelarLogin').onclick = () => {
                loginModal.style.display = 'none';
            };

            document.getElementById('btnCerrarSesion').onclick = () => {
                document.getElementById('panelOrganizadorOpciones').style.display = 'none';
                document.getElementById('estadoOrganizador').innerHTML = '<p>🔒 Acceso restringido</p><p style="font-size:0.65rem;">Ingresa contraseña</p>';
                document.getElementById('btnMostrarLoginOrganizador').style.display = 'block';
                alert('🔐 Sesión de organizador cerrada');
            };

            document.getElementById('btnExcel').onclick = () => {
                window.open(`https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/edit`, '_blank');
            };

            document.getElementById('btnVaciarTodo').onclick = () => {
                if (confirm('⚠️ ¿Eliminar TODOS los inscritos? Las fotos NO se eliminarán automáticamente.')) {
                    alert('📌 Ve a Google Sheets y elimina las filas manualmente');
                }
            };

            // Cerrar modal al hacer clic fuera
            window.onclick = (e) => {
                if (e.target === loginModal) loginModal.style.display = 'none';
            };
        }

        // ============================================
        // CAMBIAR SECCIÓN
        // ============================================
        function changeSection(section) {
            if (section === 'registro') renderRegistro();
            else if (section === 'info') renderInfo();
            else if (section === 'organizador') renderOrganizador();

            menuItems.forEach(i => i.classList.remove('active'));
            document.querySelector(`.menu-item[data-section="${section}"]`).classList.add('active');

            if (window.innerWidth <= 900) closeSidebarFunc();
        }

        menuItems.forEach(i => {
            i.addEventListener('click', () => changeSection(i.dataset.section));
        });

        // Cargar registro por defecto
        renderRegistro();
    </script>
</body>
</html>
