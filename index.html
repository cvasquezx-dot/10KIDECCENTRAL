<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valencia Race | Inscripciones 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Futura', 'Avant Garde', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #f5f7fa;
            color: #1a2a3a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Header */
        .main-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-badge {
            display: inline-block;
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            color: white;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #6a7a8a;
            font-size: 0.9rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Hero image con tu póster */
        .hero-image {
            text-align: center;
            margin: 1.5rem 0 2rem 0;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s ease;
        }

        .hero-image img:hover {
            transform: scale(1.01);
        }

        /* Layout principal */
        .dashboard {
            display: flex;
            gap: 2rem;
            min-height: 500px;
        }

        .main-content {
            flex: 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.05);
            padding: 2rem;
            transition: all 0.3s ease;
        }

        /* Botón menú móvil */
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a3a4a;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
            font-size: 1.5rem;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar.open {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            color: white;
        }

        .sidebar-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .menu-items {
            flex: 1;
            padding: 1rem 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: #f0f2f5;
        }

        .menu-item.active {
            background: #eef2f5;
            border-left-color: #2a5a6a;
        }

        .menu-icon {
            font-size: 1.5rem;
        }

        .menu-text {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1a2a3a;
        }

        .close-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            opacity: 0.7;
        }

        /* Formulario y estilos auxiliares (se mantienen igual que antes) */
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #8a9aaa;
        }
        input, select {
            width: 100%;
            background: #f8f9fb;
            border: 1px solid #e0e4e8;
            border-radius: 12px;
            padding: 12px 14px;
            color: #1a2a3a;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .photo-area {
            border: 2px dashed #d0d6dc;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            background: #fafcfd;
        }
        .photo-area:hover { border-color: #2a5a6a; background: #f0f4f6; }
        .photo-preview { margin-top: 1rem; text-align: center; display: none; }
        .photo-preview.active { display: block; }
        .preview-image img {
            width: 90px; height: 90px; object-fit: cover;
            border-radius: 50%; border: 2px solid #2a5a6a;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            border: none; color: white; padding: 12px 24px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; border-radius: 40px; width: 100%;
        }
        .btn-outline {
            background: transparent; border: 1px solid #2a5a6a; color: #2a5a6a;
            padding: 8px 16px; border-radius: 40px; cursor: pointer;
        }
        .info-list li {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 0; border-bottom: 1px solid #e8ecef;
        }
        .admin-stats {
            background: #eef2f5; border-radius: 12px; padding: 1rem;
            text-align: center; margin-bottom: 1rem;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: white; border-radius: 24px; padding: 2rem;
            width: 90%; max-width: 340px; text-align: center;
        }
        @media (max-width: 900px) {
            .menu-toggle { display: flex; }
            h1 { font-size: 2.2rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <button class="close-menu" id="closeMenu">✕</button>
        <div class="sidebar-header">
            <h3>🏃 Valencia Race</h3>
            <p>Menú de navegación</p>
        </div>
        <div class="menu-items">
            <div class="menu-item active" data-section="registro">
                <div class="menu-icon">📝</div>
                <div class="menu-text">Registro de corredor</div>
            </div>
            <div class="menu-item" data-section="info">
                <div class="menu-icon">ℹ️</div>
                <div class="menu-text">Información de la carrera</div>
            </div>
            <div class="menu-item" data-section="organizador">
                <div class="menu-icon">🔐</div>
                <div class="menu-text">Acceso organizadores</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="main-header">
            <div class="logo-badge">🏆 INSCRIPCIONES 2025</div>
            <h1>VALENCIA RACE</h1>
            <div class="subtitle">3K · 5K · 9K · La carrera más vibrante del año</div>
        </div>

        <!-- ✅ IMAGEN DE IMGBB (ya funcionando) -->
        <div class="hero-image">
            <img src="https://i.ibb.co/WWXn7fJy/251209214634265-performer-img-CAT1.jpg"
                 alt="Póster oficial Guat Maltecos"
                 loading="lazy">
        </div>

        <div class="dashboard">
            <div class="main-content" id="mainContent">
                <!-- El contenido se carga dinámicamente con JS -->
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal" style="display: none;">
        <div class="modal-box">
            <h2>🔐 Acceso organizadores</h2>
            <input type="password" id="passwordOrganizador" placeholder="Contraseña">
            <div class="btn-group" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button id="btnLogin">INGRESAR</button>
                <button id="btnCancelarLogin" class="btn-outline">CANCELAR</button>
            </div>
            <div id="errorLogin" class="error-msg" style="color:#c0392b; margin-top:0.5rem; display:none;">❌ Contraseña incorrecta</div>
        </div>
    </div>

    <script>
        // Configuración
        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwMBpzD7m6EjmN6xmNNU74jqlG1U3zJb86TySYMFSP8BhxikioQty9w678MjAEvDqkO/exec';
        const GOOGLE_SHEET_ID = '1ZDN_H9VmvKFq9i3VIjzV0pjSa97_EHw4JjVgrJ_fDwk';
        const CONTRASENA_ORGANIZADOR = "carrera2024";

        let modoOrganizador = false;
        let imagenBase64 = '';
        let imagenNombre = '';

        // Menú lateral
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        const closeMenu = document.getElementById('closeMenu');
        const menuItems = document.querySelectorAll('.menu-item');
        const mainContent = document.getElementById('mainContent');

        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeSidebarFunc() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
        menuToggle.addEventListener('click', openSidebar);
        closeMenu.addEventListener('click', closeSidebarFunc);
        overlay.addEventListener('click', closeSidebarFunc);

        // Contenido dinámico
        function renderRegistro() {
            mainContent.innerHTML = `
                <h2 style="margin-bottom:1.5rem;">📝 Registro de corredor</h2>
                <form id="formInscripcion">
                    <div class="form-group"><label>NOMBRE COMPLETO</label><input type="text" id="nombre" placeholder="Ej: Juan Pérez"></div>
                    <div class="form-group"><label>EDAD</label><input type="number" id="edad" placeholder="Ej: 25"></div>
                    <div class="form-group"><label>GÉNERO</label><select id="genero"><option value="">Selecciona</option><option>Masculino</option><option>Femenino</option><option>Otro</option></select></div>
                    <div class="form-group">
                        <label>📸 FOTO</label>
                        <div class="photo-area" id="uploadArea"><div class="camera-icon">📷</div><p>Haz clic o arrastra</p><small>JPG, PNG · máx 2MB</small></div>
                        <input type="file" id="foto" accept="image/*" style="display:none">
                        <div class="photo-preview" id="previewArea"><div class="preview-image"><img id="previewImg"><br><button type="button" class="remove-photo-btn" id="removePhotoBtn" style="display:none;">🗑️ Eliminar</button></div></div>
                    </div>
                    <button type="submit" class="btn-primary">✅ INSCRIBIRME</button>
                </form>
            `;
            initFormEvents();
        }

        function renderInfo() {
            mainContent.innerHTML = `
                <h2>ℹ️ Información de la carrera</h2>
                <ul class="info-list">
                    <li><div class="info-icon">📅</div><div class="info-text"><strong>FECHA</strong><span>15 de Junio, 2025</span></div></li>
                    <li><div class="info-icon">📍</div><div class="info-text"><strong>LUGAR</strong><span>Ciudad de las Artes, Valencia</span></div></li>
                    <li><div class="info-icon">⏰</div><div class="info-text"><strong>SALIDA</strong><span>09:30h</span></div></li>
                    <li><div class="info-icon">🏆</div><div class="info-text"><strong>DISTANCIAS</strong><span>3K · 5K · 9K</span></div></li>
                </ul>
                <div style="margin-top:1.5rem; padding:1rem; background:#eef2f5; border-radius:16px;"><p>🎽 Dorsal oficial, chip, camiseta técnica y avituallamiento</p></div>
            `;
        }

        function renderOrganizador() {
            mainContent.innerHTML = `
                <h2>🔐 Acceso organizadores</h2>
                <div id="contenidoOrganizador">
                    <div class="admin-stats" id="estadoOrganizador"><p>🔒 Acceso restringido</p><p style="font-size:0.65rem;">Ingresa contraseña</p></div>
                    <div class="btn-group"><button id="btnMostrarLoginOrganizador" class="btn-outline" style="flex:1;">🔐 INICIAR SESIÓN</button></div>
                    <div id="panelOrganizadorOpciones" style="display:none;"><div class="admin-stats"><p>📊 ACCESO CONCEDIDO</p></div>
                    <div class="btn-group"><button id="btnExcel" class="btn-outline">📊 VER SHEET</button><button id="btnVaciarTodo" class="btn-outline">⚠️ VACIAR</button></div>
                    <button id="btnCerrarSesion" class="btn-outline" style="width:100%; margin-top:1rem;">🚪 CERRAR SESIÓN</button></div>
                </div>
            `;
            initOrganizadorEvents();
        }

        function initFormEvents() {
            const uploadArea = document.getElementById('uploadArea');
            const fotoInput = document.getElementById('foto');
            const previewDiv = document.getElementById('previewArea');
            const previewImg = document.getElementById('previewImg');
            const removeBtn = document.getElementById('removePhotoBtn');
            if(uploadArea) uploadArea.onclick = () => fotoInput.click();
            fotoInput.onchange = (e) => {
                const file = e.target.files[0];
                if(file && file.size<2e6) {
                    let reader = new FileReader();
                    reader.onload = ev => { imagenBase64 = ev.target.result.split(',')[1]; previewImg.src = ev.target.result; previewDiv.classList.add('active'); removeBtn.style.display = 'inline-block'; };
                    reader.readAsDataURL(file);
                } else alert('❌ Máx 2MB');
            };
            removeBtn.onclick = () => { imagenBase64=''; fotoInput.value=''; previewImg.src=''; previewDiv.classList.remove('active'); removeBtn.style.display='none'; };
            document.getElementById('formInscripcion').onsubmit = async (e) => {
                e.preventDefault();
                let nombre = document.getElementById('nombre').value;
                let edad = document.getElementById('edad').value;
                let genero = document.getElementById('genero').value;
                if(!nombre||nombre.length<3) return alert('❌ Nombre mínimo 3 letras');
                if(!edad||edad<1||edad>120) return alert('❌ Edad 1-120');
                if(!genero) return alert('❌ Género');
                const fd = new FormData();
                fd.append('nombre',nombre); fd.append('edad',edad); fd.append('genero',genero);
                fd.append('image',imagenNombre); fd.append('himage',imagenBase64);
                let resp = await fetch(GOOGLE_SHEETS_URL,{method:'POST',body:fd});
                let json = await resp.json();
                if(json.result==='success') {
                    alert(`✅ ¡${nombre} inscrito!`); location.reload();
                } else alert('❌ Error al guardar');
            };
        }

        function initOrganizadorEvents() {
            document.getElementById('btnMostrarLoginOrganizador').onclick = () => document.getElementById('loginModal').style.display='flex';
            document.getElementById('btnLogin').onclick = () => {
                let pwd = document.getElementById('passwordOrganizador').value;
                if(pwd===CONTRASENA_ORGANIZADOR) {
                    document.getElementById('loginModal').style.display='none';
                    document.getElementById('panelOrganizadorOpciones').style.display='block';
                    document.getElementById('estadoOrganizador').innerHTML='<p>✅ ACCESO CONCEDIDO</p>';
                } else document.getElementById('errorLogin').style.display='block';
            };
            document.getElementById('btnCerrarSesion').onclick = () => location.reload();
            document.getElementById('btnExcel').onclick = () => window.open(`https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/edit`);
            document.getElementById('btnVaciarTodo').onclick = () => confirm('¿Eliminar todos?') && alert('Ve a Sheets manualmente');
            document.getElementById('btnCancelarLogin').onclick = () => document.getElementById('loginModal').style.display='none';
        }

        function changeSection(section) {
            if(section==='registro') renderRegistro();
            else if(section==='info') renderInfo();
            else if(section==='organizador') renderOrganizador();
            menuItems.forEach(i=>i.classList.remove('active'));
            document.querySelector(`.menu-item[data-section="${section}"]`).classList.add('active');
            if(window.innerWidth<=900) closeSidebarFunc();
        }
        menuItems.forEach(i=>i.addEventListener('click',()=>changeSection(i.dataset.section)));
        renderRegistro();
    </script>
</body>
</html>
