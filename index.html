<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valencia Race | Inscripciones 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Futura', 'Avant Garde', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #f5f7fa;
            color: #1a2a3a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Contenedor principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Header */
        .main-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-badge {
            display: inline-block;
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            color: white;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #6a7a8a;
            font-size: 0.9rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Layout principal */
        .dashboard {
            display: flex;
            gap: 2rem;
            min-height: 500px;
        }

        /* Contenido principal */
        .main-content {
            flex: 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.05);
            padding: 2rem;
            transition: all 0.3s ease;
        }

        /* Botón para abrir menú lateral (visible en móvil) */
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a3a4a;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
            font-size: 1.5rem;
        }

        /* ========== MENÚ LATERAL DERECHO ========== */
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar.open {
            right: 0;
        }

        /* Overlay cuando el menú está abierto */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Header del menú lateral */
        .sidebar-header {
            padding: 2rem 1.5rem;
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            color: white;
        }

        .sidebar-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        /* Opciones del menú */
        .menu-items {
            flex: 1;
            padding: 1rem 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: #f0f2f5;
        }

        .menu-item.active {
            background: #eef2f5;
            border-left-color: #2a5a6a;
        }

        .menu-icon {
            font-size: 1.5rem;
        }

        .menu-text {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1a2a3a;
        }

        .menu-item.active .menu-text {
            color: #2a5a6a;
            font-weight: 600;
        }

        /* Botón cerrar menú */
        .close-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            opacity: 0.7;
        }

        .close-menu:hover {
            opacity: 1;
        }

        /* Formulario */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #8a9aaa;
        }

        input, select {
            width: 100%;
            background: #f8f9fb;
            border: 1px solid #e0e4e8;
            border-radius: 12px;
            padding: 12px 14px;
            color: #1a2a3a;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2a5a6a;
            background: white;
            box-shadow: 0 0 0 3px rgba(26, 58, 74, 0.1);
        }

        /* Área de foto */
        .photo-area {
            border: 2px dashed #d0d6dc;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafcfd;
        }

        .photo-area:hover {
            border-color: #2a5a6a;
            background: #f0f4f6;
        }

        .camera-icon {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }

        .photo-area p {
            font-size: 0.75rem;
            color: #6a7a8a;
        }

        .photo-area small {
            font-size: 0.6rem;
            color: #9aaab8;
        }

        .photo-preview {
            margin-top: 1rem;
            text-align: center;
            display: none;
        }

        .photo-preview.active {
            display: block;
        }

        .preview-image img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #2a5a6a;
        }

        .remove-photo-btn {
            background: none;
            border: 1px solid #c0392b;
            color: #c0392b;
            padding: 3px 10px;
            font-size: 0.6rem;
            border-radius: 20px;
            margin-top: 0.5rem;
            cursor: pointer;
        }

        /* Botones */
        .btn-primary {
            background: linear-gradient(135deg, #1a3a4a, #2a5a6a);
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 40px;
            width: 100%;
            font-family: inherit;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 58, 74, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2a5a6a;
            color: #2a5a6a;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.7rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-outline:hover {
            background: #2a5a6a;
            color: white;
        }

        /* Info carrera */
        .info-list {
            list-style: none;
        }

        .info-list li {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid #e8ecef;
        }

        .info-icon {
            font-size: 1.5rem;
            width: 45px;
        }

        .info-text strong {
            display: block;
            font-size: 0.7rem;
            color: #9aaab8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-text span {
            font-size: 1rem;
            font-weight: 600;
            color: #1a2a3a;
        }

        /* Panel organizador */
        .admin-stats {
            background: #eef2f5;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .admin-stats p {
            color: #1a3a4a;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            width: 90%;
            max-width: 340px;
            text-align: center;
        }

        .modal-box input {
            margin: 1rem 0;
        }

        .error-msg {
            color: #c0392b;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            display: none;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .menu-toggle {
                display: flex;
            }
            .main-content {
                margin-right: 0;
            }
            h1 {
                font-size: 2.2rem;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Botón para abrir menú (visible en móvil) -->
    <button class="menu-toggle" id="menuToggle">☰</button>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Menú lateral derecho -->
    <div class="sidebar" id="sidebar">
        <button class="close-menu" id="closeMenu">✕</button>
        <div class="sidebar-header">
            <h3>🏃 Valencia Race</h3>
            <p>Menú de navegación</p>
        </div>
        <div class="menu-items">
            <div class="menu-item active" data-section="registro">
                <div class="menu-icon">📝</div>
                <div class="menu-text">Registro de corredor</div>
            </div>
            <div class="menu-item" data-section="info">
                <div class="menu-icon">ℹ️</div>
                <div class="menu-text">Información de la carrera</div>
            </div>
            <div class="menu-item" data-section="organizador">
                <div class="menu-icon">🔐</div>
                <div class="menu-text">Acceso organizadores</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="main-header">
            <div class="logo-badge">🏆 INSCRIPCIONES 2025</div>
            <h1>VALENCIA RACE</h1>
            <div class="subtitle">3K · 5K · 9K · La carrera más vibrante del año</div>
        </div>

        <div class="dashboard">
            <!-- Contenido principal dinámico -->
            <div class="main-content" id="mainContent">
                <!-- El contenido se carga dinámicamente con JS -->
            </div>
        </div>
    </div>

    <!-- Modal login -->
    <div id="loginModal" class="modal" style="display: none;">
        <div class="modal-box">
            <h2 style="margin-bottom: 1rem;">🔐 Acceso organizadores</h2>
            <p style="font-size: 0.75rem; color: #6a7a8a;">Ingresa la contraseña</p>
            <input type="password" id="passwordOrganizador" placeholder="Contraseña">
            <div class="btn-group">
                <button id="btnLogin">INGRESAR</button>
                <button id="btnCancelarLogin" class="btn-outline">CANCELAR</button>
            </div>
            <div id="errorLogin" class="error-msg">❌ Contraseña incorrecta</div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwMBpzD7m6EjmN6xmNNU74jqlG1U3zJb86TySYMFSP8BhxikioQty9w678MjAEvDqkO/exec';
        const GOOGLE_SHEET_ID = '1ZDN_H9VmvKFq9i3VIjzV0pjSa97_EHw4JjVgrJ_fDwk';
        const CONTRASENA_ORGANIZADOR = "carrera2024";

        let modoOrganizador = false;
        let imagenBase64 = '';
        let imagenNombre = '';

        // Elementos del menú
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        const closeMenu = document.getElementById('closeMenu');
        const menuItems = document.querySelectorAll('.menu-item');
        const mainContent = document.getElementById('mainContent');

        // ========== FUNCIONES DEL MENÚ LATERAL ==========
        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', openSidebar);
        closeMenu.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);

        // Cerrar menú al seleccionar una opción (en móvil)
        function handleMobileClose() {
            if (window.innerWidth <= 900) {
                closeSidebar();
            }
        }

        // ========== CONTENIDO DINÁMICO ==========
        // Sección Registro
        function renderRegistro() {
            mainContent.innerHTML = `
                <div style="margin-bottom: 2rem;">
                    <h2 style="font-size: 1.5rem; font-weight: 600; color: #1a2a3a;">📝 Registro de corredor</h2>
                    <p style="color: #6a7a8a; font-size: 0.8rem; margin-top: 0.25rem;">Completa tus datos para participar</p>
                </div>
                <form id="formInscripcion">
                    <div class="form-group">
                        <label>NOMBRE COMPLETO</label>
                        <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label>EDAD</label>
                        <input type="number" id="edad" placeholder="Ej: 25" min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label>GÉNERO</label>
                        <select id="genero">
                            <option value="">Selecciona</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📸 FOTO DEL CORREDOR</label>
                        <div class="photo-area" id="uploadArea">
                            <div class="camera-icon">📷</div>
                            <p>Haz clic o arrastra tu foto</p>
                            <small>JPG, PNG · máx 2MB</small>
                        </div>
                        <input type="file" id="foto" accept="image/*" style="display: none;">
                        <div class="photo-preview" id="previewArea">
                            <div class="preview-image">
                                <img id="previewImg" src="" alt="Vista previa">
                                <div>
                                    <button type="button" class="remove-photo-btn" id="removePhotoBtn" style="display: none;">🗑️ Eliminar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">✅ INSCRIBIRME AHORA</button>
                </form>
            `;
            // Re-inicializar eventos del formulario
            initFormEvents();
        }

        // Sección Información
        function renderInfo() {
            mainContent.innerHTML = `
                <div style="margin-bottom: 2rem;">
                    <h2 style="font-size: 1.5rem; font-weight: 600; color: #1a2a3a;">ℹ️ Información de la carrera</h2>
                    <p style="color: #6a7a8a; font-size: 0.8rem; margin-top: 0.25rem;">Detalles y características del evento</p>
                </div>
                <ul class="info-list">
                    <li>
                        <div class="info-icon">📅</div>
                        <div class="info-text"><strong>FECHA</strong><span>15 de Junio, 2025</span></div>
                    </li>
                    <li>
                        <div class="info-icon">📍</div>
                        <div class="info-text"><strong>LUGAR</strong><span>Ciudad de las Artes, Valencia</span></div>
                    </li>
                    <li>
                        <div class="info-icon">⏰</div>
                        <div class="info-text"><strong>SALIDA</strong><span>09:30h</span></div>
                    </li>
                    <li>
                        <div class="info-icon">🏆</div>
                        <div class="info-text"><strong>DISTANCIAS</strong><span>3K · 5K · 9K</span></div>
                    </li>
                </ul>
                <div style="margin-top: 1.5rem; padding: 1.2rem; background: #eef2f5; border-radius: 16px;">
                    <p style="font-size: 0.8rem; color: #1a3a4a; text-align: center;">🎽 Incluye dorsal oficial, chip de cronometraje, camiseta técnica y avituallamiento</p>
                </div>
            `;
        }

        // Sección Organizador
        function renderOrganizador() {
            mainContent.innerHTML = `
                <div style="margin-bottom: 2rem;">
                    <h2 style="font-size: 1.5rem; font-weight: 600; color: #1a2a3a;">🔐 Acceso organizadores</h2>
                    <p style="color: #6a7a8a; font-size: 0.8rem; margin-top: 0.25rem;">Área restringida para administradores</p>
                </div>
                <div id="contenidoOrganizador">
                    <div class="admin-stats" id="estadoOrganizador">
                        <p>🔒 Acceso restringido</p>
                        <p style="font-size: 0.65rem;">Ingresa la contraseña para acceder al panel</p>
                    </div>
                    <div class="btn-group">
                        <button id="btnMostrarLoginOrganizador" class="btn-outline" style="flex:1;">🔐 INICIAR SESIÓN</button>
                    </div>
                    <div id="panelOrganizadorOpciones" style="display: none; margin-top: 1rem;">
                        <div class="admin-stats">
                            <p>📊 ACCESO ORGANIZADOR ACTIVO</p>
                        </div>
                        <div class="btn-group">
                            <button id="btnExcel" class="btn-outline" style="flex:1;">📊 VER SHEET</button>
                            <button id="btnVaciarTodo" class="btn-outline" style="flex:1; border-color:#c0392b; color:#c0392b;">⚠️ VACIAR</button>
                        </div>
                        <button id="btnCerrarSesion" class="btn-outline" style="width:100%; margin-top: 0.8rem;">🚪 CERRAR SESIÓN</button>
                    </div>
                </div>
            `;
            initOrganizadorEvents();
        }

        // ========== EVENTOS DEL FORMULARIO ==========
        function initFormEvents() {
            const uploadArea = document.getElementById('uploadArea');
            const fotoInput = document.getElementById('foto');
            const previewAreaDiv = document.getElementById('previewArea');
            const previewImg = document.getElementById('previewImg');
            const removePhotoBtn = document.getElementById('removePhotoBtn');

            if (uploadArea) {
                uploadArea.addEventListener('click', () => fotoInput.click());
                uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
                uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('drag-over');
                    const file = e.dataTransfer.files[0];
                    if(file && file.type.startsWith('image/')) procesarImagen(file, fotoInput, previewImg, previewAreaDiv, removePhotoBtn);
                    else alert('❌ Sube un archivo de imagen válido');
                });
            }

            if (fotoInput) {
                fotoInput.addEventListener('change', (e) => { if(e.target.files[0]) procesarImagen(e.target.files[0], fotoInput, previewImg, previewAreaDiv, removePhotoBtn); });
            }

            if (removePhotoBtn) {
                removePhotoBtn.addEventListener('click', () => eliminarFoto(fotoInput, previewImg, previewAreaDiv, removePhotoBtn));
            }

            const form = document.getElementById('formInscripcion');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const nombre = document.getElementById('nombre').value;
                    const edad = document.getElementById('edad').value;
                    const genero = document.getElementById('genero').value;
                    if(!nombre || nombre.length < 3) return alert('❌ Nombre válido (mínimo 3 letras)');
                    if(!edad || edad < 1 || edad > 120) return alert('❌ Edad entre 1 y 120 años');
                    if(!genero) return alert('❌ Selecciona un género');
                    const ok = await agregarInscrito(nombre, edad, genero);
                    if(ok) {
                        form.reset();
                        eliminarFoto(fotoInput, previewImg, previewAreaDiv, removePhotoBtn);
                        alert(`✅ ¡${nombre} inscrito correctamente! 🏃‍♂️🎉`);
                    }
                });
            }
        }

        function procesarImagen(file, fotoInput, previewImg, previewAreaDiv, removePhotoBtn) {
            if(file.size > 2 * 1024 * 1024) { alert('❌ Máximo 2MB'); fotoInput.value = ''; return; }
            if(!file.type.startsWith('image/')) { alert('❌ Formato no válido'); return; }
            imagenNombre = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                imagenBase64 = ev.target.result.split(',')[1];
                previewImg.src = ev.target.result;
                previewAreaDiv.classList.add('active');
                removePhotoBtn.style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }

        function eliminarFoto(fotoInput, previewImg, previewAreaDiv, removePhotoBtn) {
            imagenBase64 = ''; imagenNombre = ''; fotoInput.value = '';
            previewImg.src = ''; previewAreaDiv.classList.remove('active');
            removePhotoBtn.style.display = 'none';
        }

        // ========== ENVÍO A GOOGLE SHEETS ==========
        async function agregarInscrito(nombre, edad, genero) {
            const fd = new FormData();
            fd.append('nombre', nombre.trim());
            fd.append('edad', parseInt(edad));
            fd.append('genero', genero);
            fd.append('image', imagenNombre);
            fd.append('himage', imagenBase64);
            try {
                const resp = await fetch(GOOGLE_SHEETS_URL, { method: 'POST', body: fd });
                const json = await resp.json();
                return json.result === 'success';
            } catch(e) {
                alert('❌ Error de conexión');
                return false;
            }
        }

        function verGoogleSheet() { window.open(`https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/edit`, '_blank'); }
        function vaciarTodos() {
            if(confirm('⚠️ ¿Eliminar TODOS los inscritos? Las fotos NO se eliminarán.'))
                alert('📌 Ve a Google Sheets y elimina las filas manualmente');
            verGoogleSheet();
        }

        // ========== ORGANIZADOR ==========
        let loginModal, panelOpciones, estadoOrganizador, btnMostrarLogin, btnCerrarSesion, btnExcel, btnVaciar;

        function initOrganizadorEvents() {
            loginModal = document.getElementById('loginModal');
            panelOpciones = document.getElementById('panelOrganizadorOpciones');
            estadoOrganizador = document.getElementById('estadoOrganizador');
            btnMostrarLogin = document.getElementById('btnMostrarLoginOrganizador');
            btnCerrarSesion = document.getElementById('btnCerrarSesion');
            btnExcel = document.getElementById('btnExcel');
            btnVaciar = document.getElementById('btnVaciarTodo');

            if (btnMostrarLogin) btnMostrarLogin.addEventListener('click', mostrarLogin);
            if (btnCerrarSesion) btnCerrarSesion.addEventListener('click', cerrarSesionOrganizador);
            if (btnExcel) btnExcel.addEventListener('click', verGoogleSheet);
            if (btnVaciar) btnVaciar.addEventListener('click', vaciarTodos);
            if (document.getElementById('btnLogin')) document.getElementById('btnLogin').addEventListener('click', intentarLogin);
            if (document.getElementById('btnCancelarLogin')) document.getElementById('btnCancelarLogin').addEventListener('click', cerrarLogin);
            window.onclick = (e) => { if(e.target === loginModal) cerrarLogin(); };
        }

        function mostrarLogin() { loginModal.style.display = 'flex'; document.getElementById('errorLogin').style.display = 'none'; }
        function cerrarLogin() { loginModal.style.display = 'none'; }
        function intentarLogin() {
            const pwd = document.getElementById('passwordOrganizador').value;
            if(pwd === CONTRASENA_ORGANIZADOR) {
                cerrarLogin();
                panelOpciones.style.display = 'block';
                estadoOrganizador.innerHTML = '<p>✅ ACCESO CONCEDIDO</p><p style="font-size:0.65rem;">Panel de control activo</p>';
                btnMostrarLogin.style.display = 'none';
            } else { 
                document.getElementById('errorLogin').style.display = 'block'; 
            }
        }
        function cerrarSesionOrganizador() {
            panelOpciones.style.display = 'none';
            estadoOrganizador.innerHTML = '<p>🔒 Acceso restringido</p><p style="font-size:0.65rem;">Ingresa la contraseña para acceder al panel</p>';
            btnMostrarLogin.style.display = 'block';
            alert('🔐 Sesión de organizador cerrada');
        }

        // ========== CAMBIAR SECCIÓN ==========
        function changeSection(section) {
            if (section === 'registro') {
                renderRegistro();
            } else if (section === 'info') {
                renderInfo();
            } else if (section === 'organizador') {
                renderOrganizador();
            }
            
            // Actualizar clase activa en el menú
            menuItems.forEach(item => {
                if (item.getAttribute('data-section') === section) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            handleMobileClose();
        }

        // Eventos del menú
        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                const section = item.getAttribute('data-section');
                changeSection(section);
            });
        });

        // Cargar sección inicial
        renderRegistro();

        // Cerrar modal al hacer clic fuera
        window.addEventListener('click', (e) => {
            if (e.target === loginModal) cerrarLogin();
        });
    </script>
</body>
</html>
